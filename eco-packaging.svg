<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f0e4"/>
      <stop offset="100%" style="stop-color:#faf6ef"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(200,225,220,0.6)"/>
      <stop offset="40%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(200,225,220,0.5)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="12"/>
  <!-- Shelf -->
  <rect x="50" y="280" width="500" height="10" rx="3" fill="#c89a40" opacity="0.6"/>
  <rect x="50" y="285" width="500" height="15" fill="#b88a30" opacity="0.3"/>
  <!-- Glass Milk Bottle 1 -->
  <rect x="100" y="165" width="50" height="12" rx="3" fill="#2e5339"/>
  <path d="M100,177 L100,275 Q100,280 110,280 L140,280 Q150,280 150,275 L150,177 Z" fill="url(#glass)" stroke="#a0c0b0" stroke-width="1.5"/>
  <path d="M102,195 L148,195 L148,275 Q148,278 140,278 L110,278 Q102,278 102,275 Z" fill="#fff" opacity="0.6"/>
  <rect x="108" y="220" width="34" height="30" rx="3" fill="#2e5339"/>
  <text x="125" y="238" text-anchor="middle" fill="#c8a951" font-family="Georgia,serif" font-size="6" font-weight="bold">PEAK</text>
  <text x="125" y="246" text-anchor="middle" fill="#c8a951" font-family="Georgia,serif" font-size="6" font-weight="bold">PURE</text>
  <!-- Glass Milk Bottle 2 -->
  <rect x="170" y="165" width="50" height="12" rx="3" fill="#2e5339"/>
  <path d="M170,177 L170,275 Q170,280 180,280 L210,280 Q220,280 220,275 L220,177 Z" fill="url(#glass)" stroke="#a0c0b0" stroke-width="1.5"/>
  <path d="M172,195 L218,195 L218,275 Q218,278 210,278 L180,278 Q172,278 172,275 Z" fill="#fff" opacity="0.6"/>
  <rect x="178" y="220" width="34" height="30" rx="3" fill="#2e5339"/>
  <text x="195" y="238" text-anchor="middle" fill="#c8a951" font-family="Georgia,serif" font-size="6" font-weight="bold">PEAK</text>
  <text x="195" y="246" text-anchor="middle" fill="#c8a951" font-family="Georgia,serif" font-size="6" font-weight="bold">PURE</text>
  <!-- Recyclable symbol -->
  <circle cx="300" cy="160" r="50" fill="#2e5339" opacity="0.1"/>
  <path d="M285,140 L300,120 L315,140 L308,140 L308,155 L292,155 L292,140 Z" fill="#2e5339" opacity="0.6" transform="rotate(0,300,155)"/>
  <path d="M285,140 L300,120 L315,140 L308,140 L308,155 L292,155 L292,140 Z" fill="#2e5339" opacity="0.6" transform="rotate(120,300,155)"/>
  <path d="M285,140 L300,120 L315,140 L308,140 L308,155 L292,155 L292,140 Z" fill="#2e5339" opacity="0.6" transform="rotate(240,300,155)"/>
  <text x="300" y="160" text-anchor="middle" fill="#2e5339" font-family="Arial,sans-serif" font-size="11" font-weight="bold">♻</text>
  <!-- Compostable box -->
  <rect x="380" y="210" width="70" height="70" rx="5" fill="#b88a30" opacity="0.6"/>
  <rect x="385" y="215" width="60" height="60" rx="3" fill="#d4a040" opacity="0.5"/>
  <text x="415" y="245" text-anchor="middle" fill="#2e5339" font-family="Arial,sans-serif" font-size="8" font-weight="bold">100%</text>
  <text x="415" y="257" text-anchor="middle" fill="#2e5339" font-family="Arial,sans-serif" font-size="7" font-weight="bold">COMPOST</text>
  <text x="415" y="267" text-anchor="middle" fill="#2e5339" font-family="Arial,sans-serif" font-size="7" font-weight="bold">ABLE</text>
  <!-- Leaf growing from box -->
  <path d="M420,210 Q430,190 440,195 Q430,200 425,210" fill="#4a8a3a"/>
  <path d="M418,212 Q410,192 415,185 Q420,195 420,212" fill="#3a7a2a"/>
  <!-- Paper bag -->
  <rect x="470" y="220" width="50" height="60" rx="3" fill="#d4b878"/>
  <path d="M470,230 L520,230" stroke="#c0a060" stroke-width="0.5"/>
  <text x="495" y="255" text-anchor="middle" fill="#8a6a30" font-family="Arial,sans-serif" font-size="7" font-weight="bold">ECO</text>
  <text x="495" y="265" text-anchor="middle" fill="#8a6a30" font-family="Arial,sans-serif" font-size="7" font-weight="bold">BAG</text>
  <!-- Branding -->
  <rect x="180" y="340" width="240" height="40" rx="8" fill="#2e5339" opacity="0.85"/>
  <text x="300" y="358" text-anchor="middle" fill="#c8a951" font-family="Georgia,serif" font-size="12" font-weight="bold">PEAK PURE</text>
  <text x="300" y="374" text-anchor="middle" fill="#ffffff" font-family="Georgia,serif" font-size="10">Eco-Friendly Packaging</text>
</svg>