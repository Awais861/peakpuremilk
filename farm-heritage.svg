<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5eed8"/>
      <stop offset="100%" style="stop-color:#e8dcc0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="12"/>
  <!-- Vintage photo border -->
  <rect x="100" y="30" width="400" height="300" fill="#fff" rx="4"/>
  <rect x="110" y="40" width="380" height="280" fill="#d8c8a0" rx="2"/>
  <!-- Old barn scene -->
  <rect x="110" y="40" width="380" height="170" fill="#8aaacb" opacity="0.5"/>
  <!-- Old mountains -->
  <polygon points="110,200 180,140 250,170 320,120 380,160 440,130 490,170 490,200" fill="#6a7a6a" opacity="0.3"/>
  <!-- Original farmhouse -->
  <rect x="220" y="155" width="120" height="70" fill="#8B6914" opacity="0.7"/>
  <polygon points="220,155 280,120 340,155" fill="#6B4914" opacity="0.7"/>
  <rect x="265" y="180" width="25" height="45" fill="#5a3a10" opacity="0.6"/>
  <rect x="230" y="170" width="20" height="20" fill="#a0c8d0" opacity="0.4"/>
  <rect x="310" y="170" width="20" height="20" fill="#a0c8d0" opacity="0.4"/>
  <!-- Silo -->
  <rect x="360" y="130" width="30" height="95" fill="#a08060" opacity="0.6" rx="2"/>
  <ellipse cx="375" cy="130" rx="15" ry="6" fill="#907050" opacity="0.6"/>
  <!-- Old pasture -->
  <path d="M110,210 Q250,195 350,205 Q430,215 490,200 L490,320 L110,320 Z" fill="#7a9a5a" opacity="0.5"/>
  <!-- Vintage sepia overlay -->
  <rect x="110" y="40" width="380" height="280" fill="#d4b878" opacity="0.15" rx="2"/>
  <!-- Photo corners -->
  <polygon points="110,40 130,40 110,60" fill="#c8b888"/>
  <polygon points="490,40 470,40 490,60" fill="#c8b888"/>
  <polygon points="110,320 130,320 110,300" fill="#c8b888"/>
  <polygon points="490,320 470,320 490,300" fill="#c8b888"/>
  <!-- Caption -->
  <text x="300" y="350" text-anchor="middle" fill="#2e5339" font-family="Georgia,serif" font-size="13" font-style="italic" opacity="0.7">Est. 1952 — The Peak Family Farm</text>
  <!-- Branding -->
  <text x="300" y="385" text-anchor="middle" fill="#c8a951" font-family="Georgia,serif" font-size="14" font-weight="bold">PEAK PURE — Our Heritage</text>
</svg>