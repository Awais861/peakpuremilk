<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f0e4"/>
      <stop offset="100%" style="stop-color:#faf6ef"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="12"/>
  <!-- Circular frame -->
  <circle cx="300" cy="170" r="110" fill="#2e5339" opacity="0.1"/>
  <circle cx="300" cy="170" r="105" fill="#faf6ef"/>
  <circle cx="300" cy="170" r="105" fill="none" stroke="#2e5339" stroke-width="3"/>
  <!-- Person - Head -->
  <circle cx="300" cy="130" r="35" fill="#8a5a30"/>
  <!-- Hair - short curly -->
  <circle cx="280" cy="105" r="8" fill="#1a0a00"/>
  <circle cx="295" cy="100" r="8" fill="#1a0a00"/>
  <circle cx="310" cy="100" r="8" fill="#1a0a00"/>
  <circle cx="325" cy="105" r="8" fill="#1a0a00"/>
  <circle cx="275" cy="112" r="7" fill="#1a0a00"/>
  <circle cx="330" cy="112" r="7" fill="#1a0a00"/>
  <circle cx="288" cy="98" r="6" fill="#1a0a00"/>
  <circle cx="315" cy="98" r="6" fill="#1a0a00"/>
  <!-- Eyes -->
  <circle cx="288" cy="128" r="4" fill="#fff"/>
  <circle cx="312" cy="128" r="4" fill="#fff"/>
  <circle cx="289" cy="129" r="2.5" fill="#1a0a00"/>
  <circle cx="313" cy="129" r="2.5" fill="#1a0a00"/>
  <!-- Smile -->
  <path d="M288,145 Q300,157 312,145" fill="none" stroke="#5a3010" stroke-width="2" stroke-linecap="round"/>
  <!-- Beard stubble suggestion -->
  <path d="M278,148 Q300,165 322,148" fill="none" stroke="#6a4a20" stroke-width="1" opacity="0.3"/>
  <!-- Green polo shirt -->
  <path d="M262,165 L255,270 L345,270 L338,165" fill="#2e5339"/>
  <!-- Collar -->
  <path d="M280,165 L300,180 L320,165" fill="#1e4329"/>
  <line x1="300" y1="165" x2="300" y2="195" stroke="#1e4329" stroke-width="2"/>
  <!-- Arms -->
  <path d="M262,175 L235,225" stroke="#2e5339" stroke-width="14" stroke-linecap="round"/>
  <path d="M338,175 L365,225" stroke="#2e5339" stroke-width="14" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="232" cy="230" r="8" fill="#8a5a30"/>
  <circle cx="368" cy="230" r="8" fill="#8a5a30"/>
  <!-- Leaf pin -->
  <path d="M340,180 Q350,170 345,160 Q340,170 330,175 Z" fill="#4ade80"/>
  <!-- Name & Title -->
  <text x="300" y="310" text-anchor="middle" fill="#2e5339" font-family="Georgia,serif" font-size="18" font-weight="bold">Marcus Obi</text>
  <text x="300" y="330" text-anchor="middle" fill="#c8a951" font-family="Georgia,serif" font-size="13">Sustainability Lead</text>
  <text x="300" y="380" text-anchor="middle" fill="#2e5339" font-family="Georgia,serif" font-size="12" font-weight="bold" opacity="0.5">PEAK PURE</text>
</svg>