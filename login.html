<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — PeakPureCow Milk</title>
  <link rel="icon" href="imgs/logo.svg" type="image/svg+xml">
  <meta name="description" content="Sign in to your PeakPureCow Milk account to manage orders, subscriptions, and farm-fresh dairy deliveries.">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
  <!-- Security -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Facebook SDK -->
  <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>
</head>
<body class="page-loaded">

  <!-- Back link -->
  <a href="signup.html" class="auth-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Create Account
  </a>

  <!-- Floating orbs -->
  <div class="auth-page">
    <div class="auth-orb auth-orb--1"></div>
    <div class="auth-orb auth-orb--2"></div>
    <div class="auth-orb auth-orb--3"></div>

    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo__icon">
          <img src="imgs/logo.svg" alt="PeakPureCow Milk">
        </div>
        <div class="auth-logo__title">Peak<span>Pure</span>Cow Milk</div>
        <p class="auth-logo__subtitle">Farm-Fresh Dairy, Delivered with Care</p>
      </div>

      <!-- Heading -->
      <div class="auth-heading">
        <h1>Welcome Back</h1>
        <p>Sign in to your account to continue</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" novalidate autocomplete="on">
        <!-- Email -->
        <div class="form-group">
          <label class="form-group__label" for="loginEmail">Email Address</label>
          <div class="form-group__input-wrap">
            <input
              type="email"
              id="loginEmail"
              name="email"
              class="form-group__input"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
            <svg class="form-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,4 12,13 2,4"/></svg>
          </div>
          <p class="form-group__error" id="loginEmailError">Please enter a valid email address</p>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-group__label" for="loginPassword">Password</label>
          <div class="form-group__input-wrap">
            <input
              type="password"
              id="loginPassword"
              name="password"
              class="form-group__input"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
              minlength="6"
            >
            <svg class="form-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <button type="button" class="form-group__toggle-pw" aria-label="Toggle password visibility" data-target="loginPassword">
              <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <p class="form-group__error" id="loginPasswordError">Password must be at least 6 characters</p>
        </div>

        <!-- Remember / Forgot -->
        <div class="form-row">
          <label class="form-check">
            <input type="checkbox" class="form-check__input" id="rememberMe" name="remember">
            <span class="form-check__label">Remember me</span>
          </label>
          <a href="#" class="form-link" id="forgotPwLink">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-auth" id="loginBtn">
          <span class="btn-auth__text">Sign In</span>
          <span class="spinner"></span>
        </button>
      </form>

      <!-- Divider -->
      <div class="auth-divider"><span>or continue with</span></div>

      <!-- Social auth -->
      <div class="social-auth">
        <button type="button" class="btn-social" id="googleAuth">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button type="button" class="btn-social" id="facebookAuth">
          <svg viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </button>
      </div>

      <!-- Switch -->
      <div class="auth-footer">
        <p>Don't have an account? <a href="signup.html">Create one free</a></p>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toastContainer"></div>

  <script src="security.js"></script>
  <script src="social-auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
