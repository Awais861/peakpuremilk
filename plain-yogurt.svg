<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf6ef"/>
      <stop offset="100%" style="stop-color:#f0e8d8"/>
    </linearGradient>
    <linearGradient id="yogurt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fffef8"/>
      <stop offset="100%" style="stop-color:#f5f0e0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="12"/>
  <ellipse cx="300" cy="345" rx="260" ry="28" fill="#2e5339" opacity="0.06"/>
  <!-- Jar body -->
  <path d="M230,150 L230,290 Q230,320 260,320 L340,320 Q370,320 370,290 L370,150 Z" fill="url(#yogurt)" stroke="#d4cbb8" stroke-width="2"/>
  <path d="M240,150 L240,300 Q240,315 260,315 L270,315 L270,150 Z" fill="rgba(255,255,255,0.4)"/>
  <!-- Jar lid -->
  <rect x="220" y="130" width="160" height="25" rx="6" fill="#2e5339"/>
  <rect x="228" y="136" width="144" height="13" rx="4" fill="#c8a951"/>
  <!-- Yogurt surface -->
  <ellipse cx="300" cy="175" rx="65" ry="8" fill="#f8f4e8" stroke="#ede5d0" stroke-width="1"/>
  <!-- Swirl decorations -->
  <path d="M280,200 Q290,185 300,195 Q310,205 320,190" fill="none" stroke="#ede5d0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Label -->
  <rect x="248" y="215" width="104" height="65" rx="6" fill="#2e5339"/>
  <text x="300" y="235" text-anchor="middle" fill="#c8a951" font-family="Georgia,serif" font-size="11" font-weight="bold">PEAK PURE</text>
  <text x="300" y="255" text-anchor="middle" fill="#ffffff" font-family="Georgia,serif" font-size="12" font-weight="bold">PLAIN</text>
  <text x="300" y="272" text-anchor="middle" fill="#ffffff" font-family="Georgia,serif" font-size="12" font-weight="bold">YOGURT</text>
  <!-- Natural badge -->
  <circle cx="390" cy="180" r="28" fill="#2e5339" opacity="0.9"/>
  <text x="390" y="176" text-anchor="middle" fill="#c8a951" font-family="Arial,sans-serif" font-size="7" font-weight="bold">100%</text>
  <text x="390" y="188" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="7" font-weight="bold">NATURAL</text>
  <text x="300" y="375" text-anchor="middle" fill="#2e5339" font-family="Georgia,serif" font-size="16" font-weight="bold" opacity="0.6">Plain Artisan Yogurt</text>
</svg>