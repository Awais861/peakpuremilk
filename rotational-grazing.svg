<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#d8f0d8"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#sky)" rx="12"/>
  <!-- Clouds -->
  <ellipse cx="150" cy="60" rx="50" ry="20" fill="#fff" opacity="0.7"/>
  <ellipse cx="130" cy="55" rx="30" ry="15" fill="#fff" opacity="0.7"/>
  <ellipse cx="450" cy="80" rx="40" ry="16" fill="#fff" opacity="0.6"/>
  <!-- Rolling hills -->
  <path d="M0,240 Q100,200 200,230 Q300,260 400,220 Q500,190 600,225 L600,400 L0,400 Z" fill="#5a9a3a" opacity="0.5"/>
  <!-- Pasture sections with different shades (rotational grazing) -->
  <!-- Section 1 - being grazed (lighter) -->
  <path d="M0,275 Q80,260 150,270 L150,400 L0,400 Z" fill="#7ab85a" opacity="0.7"/>
  <!-- Section 2 - resting (darker, taller grass) -->
  <path d="M150,270 Q220,255 300,265 L300,400 L150,400 Z" fill="#3a7a2a" opacity="0.7"/>
  <!-- Section 3 - recovering (medium) -->
  <path d="M300,265 Q380,250 450,260 L450,400 L300,400 Z" fill="#5a9a4a" opacity="0.7"/>
  <!-- Section 4 - resting (dark) -->
  <path d="M450,260 Q520,248 600,255 L600,400 L450,400 Z" fill="#2a6a1a" opacity="0.7"/>
  <!-- Fence between sections -->
  <line x1="150" y1="270" x2="150" y2="350" stroke="#8B6914" stroke-width="2.5"/>
  <line x1="300" y1="265" x2="300" y2="350" stroke="#8B6914" stroke-width="2.5"/>
  <line x1="450" y1="260" x2="450" y2="350" stroke="#8B6914" stroke-width="2.5"/>
  <!-- Horizontal fence rails -->
  <line x1="0" y1="290" x2="150" y2="285" stroke="#8B6914" stroke-width="2"/>
  <line x1="150" y1="285" x2="300" y2="280" stroke="#8B6914" stroke-width="2"/>
  <line x1="300" y1="280" x2="450" y2="275" stroke="#8B6914" stroke-width="2"/>
  <line x1="450" y1="275" x2="600" y2="270" stroke="#8B6914" stroke-width="2"/>
  <!-- Cows in section 1 -->
  <ellipse cx="70" cy="290" rx="22" ry="12" fill="#f5f0e8"/>
  <ellipse cx="55" cy="283" rx="8" ry="7" fill="#f5f0e8"/>
  <circle cx="52" cy="281" r="1.5" fill="#333"/>
  <ellipse cx="120" cy="295" rx="18" ry="10" fill="#e8ddd0"/>
  <ellipse cx="108" cy="289" rx="7" ry="6" fill="#e8ddd0"/>
  <circle cx="105" cy="287" r="1.5" fill="#333"/>
  <!-- Grass tufts in resting section -->
  <line x1="180" y1="280" x2="178" y2="268" stroke="#2a6a1a" stroke-width="1.5"/>
  <line x1="185" y1="280" x2="187" y2="267" stroke="#2a6a1a" stroke-width="1.5"/>
  <line x1="220" y1="275" x2="218" y2="262" stroke="#2a6a1a" stroke-width="1.5"/>
  <line x1="225" y1="275" x2="227" y2="263" stroke="#2a6a1a" stroke-width="1.5"/>
  <line x1="260" y1="272" x2="258" y2="259" stroke="#2a6a1a" stroke-width="1.5"/>
  <!-- Arrow showing rotation -->
  <path d="M75,250 Q225,220 375,240" fill="none" stroke="#c8a951" stroke-width="2.5" stroke-dasharray="8,4"/>
  <polygon points="375,240 365,232 368,244" fill="#c8a951"/>
  <!-- Section labels -->
  <text x="75" y="330" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="9" font-weight="bold">GRAZING</text>
  <text x="225" y="325" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="9" font-weight="bold">RESTING</text>
  <text x="375" y="322" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="9" font-weight="bold">RECOVERY</text>
  <text x="525" y="320" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="9" font-weight="bold">READY</text>
  <!-- Branding -->
  <rect x="180" y="350" width="240" height="40" rx="8" fill="#2e5339" opacity="0.85"/>
  <text x="300" y="368" text-anchor="middle" fill="#c8a951" font-family="Georgia,serif" font-size="12" font-weight="bold">PEAK PURE</text>
  <text x="300" y="384" text-anchor="middle" fill="#ffffff" font-family="Georgia,serif" font-size="10">Rotational Grazing</text>
</svg>