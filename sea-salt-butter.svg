<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf6ef"/>
      <stop offset="100%" style="stop-color:#f0ece0"/>
    </linearGradient>
    <linearGradient id="butter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff0c0"/>
      <stop offset="100%" style="stop-color:#e8c850"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="12"/>
  <ellipse cx="300" cy="340" rx="260" ry="28" fill="#2e5339" opacity="0.06"/>
  <!-- Wooden board -->
  <rect x="150" y="232" width="300" height="28" rx="4" fill="#c89a40" opacity="0.5"/>
  <!-- Butter block -->
  <path d="M220,130 L380,130 L380,230 L220,230 Z" fill="url(#butter)" stroke="#d8b840" stroke-width="1.5"/>
  <path d="M220,130 L240,110 L400,110 L380,130 Z" fill="#fff0c0" stroke="#d8b840" stroke-width="1"/>
  <path d="M380,130 L400,110 L400,210 L380,230 Z" fill="#d8b840" stroke="#d8b840" stroke-width="1"/>
  <!-- Salt crystals on top -->
  <circle cx="260" cy="118" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="290" cy="115" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="320" cy="120" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="350" cy="116" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="275" cy="122" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="335" cy="113" r="1.8" fill="#fff" opacity="0.75"/>
  <circle cx="305" cy="118" r="1.5" fill="#e8e8f0" opacity="0.8"/>
  <circle cx="370" cy="118" r="1.2" fill="#fff" opacity="0.7"/>
  <!-- Salt crystals on front -->
  <circle cx="250" cy="160" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="300" cy="175" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="350" cy="150" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="280" cy="200" r="1" fill="#fff" opacity="0.4"/>
  <!-- Label on butter -->
  <rect x="255" y="148" width="100" height="65" rx="4" fill="#4a7a8a" opacity="0.9"/>
  <text x="305" y="167" text-anchor="middle" fill="#c8a951" font-family="Georgia,serif" font-size="10" font-weight="bold">PEAK PURE</text>
  <text x="305" y="185" text-anchor="middle" fill="#ffffff" font-family="Georgia,serif" font-size="10" font-weight="bold">SEA SALT</text>
  <text x="305" y="203" text-anchor="middle" fill="#ffffff" font-family="Georgia,serif" font-size="11" font-weight="bold">BUTTER</text>
  <!-- Sea salt badge -->
  <circle cx="180" cy="135" r="30" fill="#4a7a8a" opacity="0.85"/>
  <text x="180" y="130" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="7" font-weight="bold">FLAKED</text>
  <text x="180" y="142" text-anchor="middle" fill="#c8a951" font-family="Arial,sans-serif" font-size="7" font-weight="bold">SEA SALT</text>
  <!-- Salt shaker -->
  <rect x="430" y="160" width="20" height="50" rx="4" fill="#e8e8e8"/>
  <rect x="428" y="155" width="24" height="10" rx="3" fill="#c0c0c8"/>
  <circle cx="436" cy="158" r="1.5" fill="#999"/>
  <circle cx="444" cy="158" r="1.5" fill="#999"/>
  <circle cx="440" cy="162" r="1.5" fill="#999"/>
  <text x="300" y="375" text-anchor="middle" fill="#4a7a8a" font-family="Georgia,serif" font-size="16" font-weight="bold" opacity="0.7">Sea Salt Butter</text>
</svg>