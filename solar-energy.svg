<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#e8f4e8"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#sky)" rx="12"/>
  <!-- Sun -->
  <circle cx="480" cy="60" r="40" fill="#f8e060" opacity="0.6"/>
  <circle cx="480" cy="60" r="28" fill="#fff8c0"/>
  <!-- Sun rays -->
  <line x1="480" y1="15" x2="480" y2="5" stroke="#f8e060" stroke-width="3" opacity="0.5"/>
  <line x1="510" y1="30" x2="520" y2="22" stroke="#f8e060" stroke-width="3" opacity="0.5"/>
  <line x1="525" y1="60" x2="535" y2="60" stroke="#f8e060" stroke-width="3" opacity="0.5"/>
  <line x1="450" y1="30" x2="440" y2="22" stroke="#f8e060" stroke-width="3" opacity="0.5"/>
  <!-- Green fields -->
  <path d="M0,280 Q150,260 300,270 Q450,280 600,260 L600,400 L0,400 Z" fill="#4a8a3a" opacity="0.6"/>
  <path d="M0,310 Q200,290 350,305 Q500,320 600,295 L600,400 L0,400 Z" fill="#3a7a2a" opacity="0.7"/>
  <!-- Barn -->
  <rect x="80" y="200" width="140" height="100" fill="#8B3A3A"/>
  <polygon points="80,200 150,155 220,200" fill="#6B2A2A"/>
  <rect x="130" y="250" width="40" height="50" fill="#5B2A1A"/>
  <!-- Solar panels on barn roof - left side -->
  <rect x="88" y="185" width="55" height="30" fill="#2a3a5a" transform="rotate(-20,115,200)"/>
  <line x1="92" y1="190" x2="92" y2="210" stroke="#4a6a8a" stroke-width="0.5" transform="rotate(-20,115,200)"/>
  <line x1="105" y1="190" x2="105" y2="210" stroke="#4a6a8a" stroke-width="0.5" transform="rotate(-20,115,200)"/>
  <line x1="118" y1="190" x2="118" y2="210" stroke="#4a6a8a" stroke-width="0.5" transform="rotate(-20,115,200)"/>
  <line x1="131" y1="190" x2="131" y2="210" stroke="#4a6a8a" stroke-width="0.5" transform="rotate(-20,115,200)"/>
  <line x1="88" y1="198" x2="143" y2="198" stroke="#4a6a8a" stroke-width="0.5" transform="rotate(-20,115,200)"/>
  <!-- Solar panels right side -->
  <rect x="160" y="185" width="55" height="30" fill="#2a3a5a" transform="rotate(20,188,200)"/>
  <line x1="164" y1="190" x2="164" y2="210" stroke="#4a6a8a" stroke-width="0.5" transform="rotate(20,188,200)"/>
  <line x1="177" y1="190" x2="177" y2="210" stroke="#4a6a8a" stroke-width="0.5" transform="rotate(20,188,200)"/>
  <line x1="190" y1="190" x2="190" y2="210" stroke="#4a6a8a" stroke-width="0.5" transform="rotate(20,188,200)"/>
  <line x1="203" y1="190" x2="203" y2="210" stroke="#4a6a8a" stroke-width="0.5" transform="rotate(20,188,200)"/>
  <!-- Standalone solar panels -->
  <rect x="320" y="210" width="8" height="60" fill="#888"/>
  <rect x="295" y="195" width="58" height="35" rx="2" fill="#2a3a5a" transform="rotate(-15,324,212)"/>
  <line x1="310" y1="198" x2="310" y2="228" stroke="#4a6a8a" stroke-width="0.5" transform="rotate(-15,324,212)"/>
  <line x1="324" y1="198" x2="324" y2="228" stroke="#4a6a8a" stroke-width="0.5" transform="rotate(-15,324,212)"/>
  <line x1="338" y1="198" x2="338" y2="228" stroke="#4a6a8a" stroke-width="0.5" transform="rotate(-15,324,212)"/>
  <rect x="430" y="220" width="8" height="50" fill="#888"/>
  <rect x="405" y="205" width="58" height="35" rx="2" fill="#2a3a5a" transform="rotate(-15,434,222)"/>
  <!-- Glint on panels -->
  <rect x="300" y="200" width="8" height="4" fill="#fff" opacity="0.5" transform="rotate(-15,324,212)"/>
  <rect x="410" y="210" width="8" height="4" fill="#fff" opacity="0.5" transform="rotate(-15,434,222)"/>
  <!-- Branding -->
  <rect x="180" y="345" width="240" height="40" rx="8" fill="#2e5339" opacity="0.85"/>
  <text x="300" y="363" text-anchor="middle" fill="#c8a951" font-family="Georgia,serif" font-size="12" font-weight="bold">PEAK PURE</text>
  <text x="300" y="379" text-anchor="middle" fill="#ffffff" font-family="Georgia,serif" font-size="10">Solar-Powered Farm</text>
</svg>